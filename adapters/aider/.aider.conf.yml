# Agent-Drift Configuration for Aider
# Append this to your existing .aider.conf.yml

# Drift detection protocol instructions
read:
  - prompts/drift-lock.md
  - prompts/drift-check.md
  - prompts/drift-fence.md
  - prompts/drift-status.md
  - prompts/drift-report.md
  - references/drift-types.md
  - references/spec-schema.md

# System message addition for drift awareness
extra-system-message: |
  You are equipped with Agent-Drift. Before executing multi-step tasks:
  1. Parse instructions into a structured spec (requirements with MUST/SHOULD/MAY priority, constraints, technology locks, scope boundaries)
  2. Present the spec for confirmation before proceeding
  3. Self-check every 10 actions for drift (requirement status, constraint compliance, scope boundaries)
  4. If drift detected, alert the user before continuing
  5. At session end, report compliance with per-requirement delivery status and a drift score (0=perfect, 100=total drift)
  
  8 drift types: REQUIREMENT_DRIFT, SCOPE_CREEP, CONSTRAINT_VIOLATION, TECHNOLOGY_SWAP, PRIORITY_INVERSION, SILENT_DROP, GOLD_PLATING, COMPLETION_HALLUCINATION.
  
  Constraints are immutable once added. Severity escalates on repeat violations.
